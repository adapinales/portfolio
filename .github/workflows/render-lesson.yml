name: Render Lesson

# Renders an Income Switch lesson in the cloud (GitHub's servers have a
# compatible OS + open network), so it works regardless of your Mac.
#
# How to use:
#   1. In Google Drive, set the lesson video to "Anyone with the link".
#   2. Actions tab -> "Render Lesson" -> "Run workflow".
#   3. Paste the Drive link (or leave the default for Start Here) -> Run.
#   4. When it finishes (green check), open the run and download the
#      "finished-video" artifact at the bottom.

on:
  workflow_dispatch:
    inputs:
      drive_url:
        description: "Google Drive link to the lesson video (must be shareable)"
        required: true
        default: "https://drive.google.com/file/d/1WGR3HJSSEVoPdzR0Rr0CsuAteMoY_r5L/view"
      whisper_model:
        description: "Caption accuracy model (small.en is a good balance; medium.en is more accurate but slower)"
        required: true
        default: "small.en"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: income-switch-video
    steps:
      - name: Check out the project
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install project dependencies
        run: npm ci

      - name: Download the lesson video from Google Drive
        run: |
          pipx install gdown
          URL="${{ github.event.inputs.drive_url }}"
          # Pull the long file-id token out of whatever Drive URL format was given.
          FILE_ID=$(echo "$URL" | grep -oE '[-_A-Za-z0-9]{25,}' | head -n1)
          echo "Downloading Drive file id: $FILE_ID"
          gdown "https://drive.google.com/uc?id=${FILE_ID}" -O public/lesson.mp4
          ls -lh public/lesson.mp4

      - name: Normalize footage to constant frame rate
        # Re-encode to a steady 30fps so the rendered video never freezes
        # (variable-frame-rate recordings cause the picture to stutter while
        # audio stays fine).
        run: |
          ffmpeg -y -i public/lesson.mp4 \
            -r 30 -fps_mode cfr \
            -c:v libx264 -preset veryfast -crf 18 -pix_fmt yuv420p \
            -c:a aac -b:a 192k \
            public/lesson_cfr.mp4
          mv public/lesson_cfr.mp4 public/lesson.mp4
          ls -lh public/lesson.mp4

      - name: Generate captions (Whisper)
        env:
          WHISPER_MODEL: ${{ github.event.inputs.whisper_model }}
        run: npm run transcribe

      - name: Render the finished video
        run: npm run render

      - name: Upload the finished video
        uses: actions/upload-artifact@v4
        with:
          name: finished-video
          path: income-switch-video/out/start-here.mp4
          if-no-files-found: error
          retention-days: 90
